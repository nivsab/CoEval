# CoEval — EXP-004: Verbosity Bias Analysis
# =============================================================================
# Purpose : Measure the correlation between student response length (token count)
#           and judge-assigned score for individual judges vs. the ensemble.
#           Validates the claim that ensemble calibration reduces verbosity bias.
#
# Design  : This is a PURE RE-ANALYSIS experiment — no new API calls needed.
#           Uses existing medium-benchmark-v1 phase4 response files (which
#           contain token_count) and phase5 evaluation files (which contain
#           judge scores). A custom analyzer computes Pearson and Spearman
#           correlations between token_count and normalised score.
#
# Analysis steps:
#   1. Load all phase4 response records → extract (response_id, token_count)
#   2. Load all phase5 evaluation records → extract (response_id, judge_id, score_norm)
#   3. Compute Pearson r(token_count, score_norm) per judge per task
#   4. Compute Spearman rho(token_count, score_norm) per judge per task
#   5. Compute ensemble score per response → r(token_count, ensemble_score) per task
#   6. Compare individual judge r vs ensemble r (expected: ensemble r < individual r)
#
# Run command (analyzer patch needed):
#   coeval analyze verbosity-bias \
#       --run Runs/medium-benchmark \
#       --out Runs/EXP004-verbosity-bias-analysis/reports
#
# Source data: Runs/medium-benchmark/ (phase4 + phase5 outputs)
#
# NOTE: This config.yaml is provided for documentation and potential future
#       use if the verbosity bias analysis is extended to new data. The
#       primary scenario requires no new API calls.
#
# Call budget:
#   New API calls: 0
#   CPU analysis:  < 5 minutes
# =============================================================================


# ─── MODELS ──────────────────────────────────────────────────────────────────
# Model panel mirrors medium-benchmark-v1 exactly, for reference only.
# No models are executed — all phases are set to Keep.

models:

  - name: gpt-4o-mini
    interface: openai
    parameters:
      model: gpt-4o-mini
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 512
      student:
        temperature: 0.7
        max_tokens: 256
      judge:
        temperature: 0.0
        max_tokens: 128

  - name: gpt-3.5-turbo
    interface: openai
    parameters:
      model: gpt-3.5-turbo
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 512
      student:
        temperature: 0.7
        max_tokens: 256
      judge:
        temperature: 0.0
        max_tokens: 128

  - name: qwen2p5-0b5
    interface: huggingface
    parameters:
      model: Qwen/Qwen2.5-0.5B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
      load_in_4bit: true
    roles: [teacher, student]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.7
        max_new_tokens: 256

  - name: qwen2p5-1b5
    interface: huggingface
    parameters:
      model: Qwen/Qwen2.5-1.5B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
      load_in_4bit: true
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.7
        max_new_tokens: 256
      judge:
        temperature: 0.0
        max_new_tokens: 256

  - name: smollm2-1b7
    interface: huggingface
    parameters:
      model: HuggingFaceTB/SmolLM2-1.7B-Instruct
      temperature: 0.7
      max_new_tokens: 512
      device: auto
      load_in_4bit: true
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_new_tokens: 512
      student:
        temperature: 0.7
        max_new_tokens: 256
      judge:
        temperature: 0.0
        max_new_tokens: 256


# ─── TASKS ───────────────────────────────────────────────────────────────────
# Task definitions mirror medium-benchmark-v1 for reference.

tasks:

  - name: text_summarization
    description: >
      Summarise a given passage of text. The summary must capture all key
      information at the specified depth, match the required tone.
    output_description: >
      A summary (50-150 words for moderate/detailed; 1-2 sentences for brief).

    target_attributes:
      complexity:   [simple, moderate, complex, technical]
      tone:         [neutral, formal, conversational, critical]
      length:       [brief, moderate, detailed]
      audience:     [general_public, professional, expert, student]
      format:       [paragraph, bullet_points, headline_and_body]

    nuanced_attributes:
      domain:      [science, business, politics, technology, health]
      source_type: [news_article, academic_paper, corporate_report, blog_post]

    sampling:
      target: [1, 2]
      nuance: [1, 2]
      total: 20

    rubric:
      accuracy:         "The summary correctly captures the main points without distortion or fabrication."
      conciseness:      "The summary avoids redundancy and stays within the specified length and format."
      readability:      "The summary is grammatically correct, well-structured, and easy to read."
      tone_consistency: "The tone matches the specified requirement throughout the summary."
      completeness:     "No key points from the passage are omitted given the specified depth."

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        Return as JSON with exactly two keys: "prompt" and "response".

  - name: code_explanation
    description: >
      Explain a given code snippet clearly for the specified audience.
    output_description: >
      A code explanation (80-200 words).

    target_attributes:
      language:          [python, javascript, java, sql, bash]
      complexity:        [beginner, intermediate, advanced]
      explanation_style: [step_by_step, conceptual_overview, example_driven]
      audience:          [novice_programmer, junior_developer, senior_engineer]
      depth:             [surface, standard, deep_dive]

    nuanced_attributes:
      paradigm:    [functional, object_oriented, procedural]
      code_quality: [clean_idiomatic, legacy_style, optimised]

    sampling:
      target: [1, 2]
      nuance: [1, 2]
      total: 20

    rubric:
      technical_accuracy: "All statements about what the code does are factually correct."
      clarity:            "The explanation is clearly written and avoids unnecessary jargon."
      appropriate_level:  "The depth and vocabulary precisely match the specified audience."
      completeness:       "The explanation covers all significant parts of the snippet."
      practical_value:    "The explanation helps the reader understand how to use this pattern."

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        Return as JSON with exactly two keys: "prompt" and "response".

  - name: email_composition
    description: >
      Write a professional email matching the specified purpose, tone, and length.
    output_description: >
      A complete email including Subject line, greeting, body, and sign-off.

    target_attributes:
      tone:      [formal, semi_formal, casual, assertive, empathetic]
      purpose:   [information_request, project_update, complaint_resolution, proposal, follow_up]
      urgency:   [low, medium, high, critical]
      length:    [brief, standard, detailed]
      formality: [peer_to_peer, manager_to_report, report_to_manager, external_client, executive]

    nuanced_attributes:
      industry:     [technology, finance, healthcare, education, manufacturing]
      relationship: [established_colleague, new_contact, long_term_client, vendor, cross_team]

    sampling:
      target: [1, 2]
      nuance: [1, 2]
      total: 20

    rubric:
      clarity:           "The email communicates its purpose unambiguously in the first paragraph."
      appropriate_tone:  "The tone and formality precisely match the specified relationship and context."
      completeness:      "All necessary information is included; nothing critical is omitted."
      professionalism:   "The email is free of grammatical errors and follows professional email conventions."
      actionability:     "Where a response or action is needed, the request is specific and easy to act on."

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        Return as JSON with exactly two keys: "prompt" and "response".

  - name: data_interpretation
    description: >
      Interpret a described dataset or visualisation for the specified audience.
    output_description: >
      An interpretation (80-200 words) identifying the primary trend.

    target_attributes:
      data_type:     [bar_chart, line_graph, scatter_plot, pivot_table, heatmap, histogram]
      insight_depth: [surface_observation, analytical_interpretation, predictive_inference]
      audience:      [executive, data_analyst, technical_specialist, general_public]
      domain:        [sales_revenue, public_health, climate, financial_markets, demographics]
      complexity:    [single_variable, bivariate_comparison, multivariate_statistical]

    nuanced_attributes:
      time_period:     [monthly, quarterly, annual, multi_year_longitudinal]
      comparison_type: [year_over_year, benchmark_vs_target, regional_breakdown, before_after]

    sampling:
      target: [1, 2]
      nuance: [1, 2]
      total: 20

    rubric:
      accuracy:             "All numerical claims and trend descriptions accurately reflect the described data."
      insight_quality:      "The interpretation goes beyond stating the obvious; it explains why the trend matters."
      statistical_literacy: "Statistical language is used correctly and proportionally to the data complexity."
      clarity:              "The interpretation is clearly structured: observation → explanation → implication."
      appropriate_caveats:  "Limitations in the data are acknowledged where relevant; claims are not overstated."

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.
        Return only a JSON object with keys "prompt" and "response". No explanation.

      sample.smollm2-1b7: >
        Generate a natural benchmark data point for the task {task_description} and produce a
        response {output_description}, where the response is specified with {target_attributes}.
        Return as JSON with exactly two keys: "prompt" and "response".


# ─── EXPERIMENT ──────────────────────────────────────────────────────────────

experiment:
  id: EXP004-verbosity-bias-analysis
  storage_folder: ./Runs
  log_level: INFO

  # All phases set to Keep — this experiment is a pure re-analysis.
  # Point the analyzer at Runs/medium-benchmark/ for the source data.
  phases:
    attribute_mapping:   Keep
    rubric_mapping:      Keep
    data_generation:     Keep
    response_collection: Keep
    evaluation:          Keep

  # No quota needed — no API calls are made in re-analysis mode.
  quota: {}
