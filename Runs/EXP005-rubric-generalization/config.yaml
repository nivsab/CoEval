# CoEval — EXP-005: Cross-Task Rubric Generalization Analysis
# =============================================================================
# Purpose : Demonstrate that CoEval rubric criteria generalize meaningfully
#           across task types by analysing criterion overlap and semantic
#           similarity between rubrics generated for different tasks.
#
# Design  : This is primarily an ANALYTICAL experiment — no new response
#           collection or evaluation is needed. The analysis compares rubric
#           criteria across the 4 medium-benchmark-v1 tasks using semantic
#           similarity (sentence embeddings) to identify:
#             (a) shared criteria that appear across all tasks (e.g. accuracy,
#                 clarity, completeness)
#             (b) task-specific criteria that are unique to certain domains
#
# Per the backlog, this experiment is "purely analytical, no new experiments
# needed" (EXP-005 notes: "30 min analysis").
#
# If desired, two new tasks (legal_document_analysis, medical_summarization)
# can be added to extend the generalization study to additional domains.
# The config below includes these optional extension tasks, which require
# Phase 1-3 generation with gpt-4o-mini as teacher, and Phase 4-5 evaluation.
#
# The CORE scenario (rubric overlap analysis of medium-benchmark tasks) costs
# $0 and requires no new API calls.
#
# The EXTENSION scenario (2 new tasks, 20 items each) costs ~$0.25-$0.50.
#
# Tasks (core analysis only, 0 API calls):
#   text_summarization, code_explanation, email_composition, data_interpretation
#   → analysed from medium-benchmark-v1 phase1/2 rubric files
#
# Tasks (optional extension, requires new generation):
#   legal_document_analysis  (20 items, gpt-4o-mini teacher)
#   medical_summarization    (20 items, gpt-4o-mini teacher)
#
# Models (extension only):
#   Teacher: gpt-4o-mini
#   Students: gpt-4o-mini, gpt-3.5-turbo
#   Judges: gpt-4o-mini
# =============================================================================


# ─── MODELS ──────────────────────────────────────────────────────────────────

models:

  # --------------------------------------------------------------------------
  # gpt-4o-mini: teacher + student + judge (all roles for extension tasks)
  # --------------------------------------------------------------------------
  - name: gpt-4o-mini
    interface: openai
    parameters:
      model: gpt-4o-mini
      temperature: 0.7
      max_tokens: 512
    roles: [teacher, student, judge]
    role_parameters:
      teacher:
        temperature: 0.8
        max_tokens: 512
      student:
        temperature: 0.7
        max_tokens: 256
      judge:
        temperature: 0.0
        max_tokens: 128

  # --------------------------------------------------------------------------
  # gpt-3.5-turbo: student only (for extension tasks)
  # --------------------------------------------------------------------------
  - name: gpt-3.5-turbo
    interface: openai
    parameters:
      model: gpt-3.5-turbo
      temperature: 0.7
      max_tokens: 512
    roles: [student]
    role_parameters:
      student:
        temperature: 0.7
        max_tokens: 256


# ─── TASKS ───────────────────────────────────────────────────────────────────
# The two NEW domain tasks below are included for the optional extension.
# Core rubric generalization analysis does not require these tasks to be run —
# it operates on the existing medium-benchmark-v1 phase1/2 rubric files.

tasks:

  # ══════════════════════════════════════════════════════════════════════════
  # Extension Task 1 — Legal Document Analysis
  # New domain not present in medium-benchmark-v1.
  # Rubric auto-generated by Phase 2 to test cross-domain generalization.
  # ══════════════════════════════════════════════════════════════════════════
  - name: legal_document_analysis
    description: >
      Analyse a described legal document or clause and explain its key
      implications, obligations, and potential risks in plain English.
      The analysis must be appropriate for the specified audience and
      correctly identify the most legally significant elements.
    output_description: >
      An analysis (150-300 words) that identifies the document type,
      explains the key obligations and rights of each party, highlights
      any unusual or high-risk clauses, and summarises the practical
      implications for the specified reader. Legal jargon must be defined
      when unavoidable. Must not constitute legal advice.

    target_attributes:
      document_type:    [contract, nda, terms_of_service, lease_agreement, employment_agreement]
      audience:         [general_public, business_manager, legal_professional]
      complexity:       [standard, moderately_complex, highly_complex]
      analysis_depth:   [summary_overview, clause_by_clause, risk_focused]

    nuanced_attributes:
      jurisdiction:     [us_commercial, uk_common_law, eu_gdpr_context, generic_international]
      risk_level:       [low_risk, moderate_risk, high_risk]

    sampling:
      target: [1, 2]
      nuance: [1, 1]
      total: 20

    # Rubric auto-generated by Phase 2 — testing whether criteria like
    # accuracy, clarity, completeness appear spontaneously for a new domain.
    rubric: auto

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "Analyse the following NDA clause: 'The Receiving Party agrees to maintain in confidence all Confidential Information disclosed by the Disclosing Party and not to disclose such information to any third party without prior written consent.'",
          "response": "This is a standard non-disclosure clause establishing a confidentiality obligation. The Receiving Party (you or your organisation) must keep any information marked as confidential strictly private and cannot share it with outside parties without getting written permission first. The clause is broad in scope — 'all Confidential Information' may include verbal disclosures, which creates practical challenges in tracking what is covered. Key risk: the clause does not specify a time limit on the confidentiality obligation, which means it could theoretically be perpetual. Before signing, clarify what categories of information are excluded (e.g. publicly available data) and negotiate a fixed term (typically 2-5 years for commercial NDAs)."}}

        Now generate a NEW, different data point fitting the required attributes.
        Return only a JSON object with keys "prompt" and "response". No explanation.


  # ══════════════════════════════════════════════════════════════════════════
  # Extension Task 2 — Medical Summarization
  # New domain not present in medium-benchmark-v1.
  # Rubric auto-generated by Phase 2 to test cross-domain generalization.
  # ══════════════════════════════════════════════════════════════════════════
  - name: medical_summarization
    description: >
      Summarise a clinical case description, research abstract, or patient
      report for the specified healthcare audience. The summary must accurately
      convey the key clinical findings, avoid introducing errors, and use
      appropriate terminology for the target reader.
    output_description: >
      A clinical summary (100-250 words) that identifies the key presenting
      complaint or research question, the main findings, the clinical
      significance, and the recommended action or conclusion. Must not
      introduce clinical facts not present in the source. Terminology must
      match the audience level.

    target_attributes:
      source_type:     [clinical_case, research_abstract, patient_report, guideline_excerpt]
      audience:        [patient, junior_clinician, specialist, researcher]
      clinical_domain: [cardiology, oncology, neurology, primary_care, emergency_medicine]
      summary_depth:   [high_level, standard, detailed]

    nuanced_attributes:
      complexity:       [straightforward, moderate, complex_multisystem]
      terminology_level: [lay_language, clinical, highly_technical]

    sampling:
      target: [1, 2]
      nuance: [1, 1]
      total: 20

    # Rubric auto-generated by Phase 2 — testing whether clinically-grounded
    # criteria (faithfulness, clinical accuracy) emerge alongside generic ones.
    rubric: auto

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "Summarise the following case: A 67-year-old male with a 3-day history of progressive dyspnoea and bilateral leg oedema. Past history of hypertension and type 2 diabetes. ECG shows sinus tachycardia. BNP is markedly elevated at 1,450 pg/mL. Echocardiography reveals LVEF of 30% with global hypokinesis.",
          "response": "This case presents a 67-year-old man with acute decompensated heart failure, evidenced by dyspnoea, bilateral oedema, markedly elevated BNP (1,450 pg/mL), and echocardiographic findings of severely reduced left ventricular ejection fraction (30%) with global hypokinesis. His background of hypertension and type 2 diabetes are established risk factors for heart failure with reduced ejection fraction (HFrEF). Immediate management priorities include diuresis for volume overload and initiation or optimisation of guideline-directed medical therapy (GDMT), including ACE inhibitors/ARBs, beta-blockers, and SGLT2 inhibitors where tolerated. Cardiology review is indicated for further workup including coronary angiography to exclude ischaemic aetiology."}}

        Now generate a NEW, different data point fitting the required attributes.
        Return only a JSON object with keys "prompt" and "response". No explanation.


# ─── EXPERIMENT ──────────────────────────────────────────────────────────────

experiment:
  id: EXP005-rubric-generalization
  storage_folder: ./Runs
  log_level: INFO
  generation_retries: 2

  # CORE analysis (no new API calls): point the analyzer at medium-benchmark-v1
  # rubric files and compute overlap statistics.
  #   coeval analyze rubric-overlap \
  #       --run Runs/medium-benchmark \
  #       --out Runs/EXP005-rubric-generalization/reports
  #
  # EXTENSION (new tasks): run phases 1-5 for legal_document_analysis and
  # medical_summarization with gpt-4o-mini as teacher/judge.
  phases:
    attribute_mapping:   New    # Phase 1: generate target attributes for new tasks
    rubric_mapping:      New    # Phase 2: auto-generate rubrics for new tasks
    data_generation:     New    # Phase 3: 20 items per task × 2 tasks = 40 items
    response_collection: New    # Phase 4: 40 items × 2 students = 80 responses
    evaluation:          New    # Phase 5: 80 responses × 1 judge = 80 evaluations

  # Enable batch API for Phase 4 + 5
  batch:
    openai:
      response_collection: true
      evaluation:          true

  # Conservative quotas for extension scenario
  # Phase 3: 40 teacher calls
  # Phase 4: 40 student calls each for 2 students = 80 total
  # Phase 5: 80 responses × ~5 criteria × 1 judge = 400 judge calls
  # Total gpt-4o-mini (all roles): 40 + 40 + 400 = 480; set limit at 600
  quota:
    gpt-4o-mini:
      max_calls: 600
    gpt-3.5-turbo:
      max_calls: 100
