tasks:
- description: Answer a science exam multiple-choice question. Output only the correct
    option text.
  evaluation_mode: single
  name: science_qa
  nuanced_attributes: {}
  output_description: The exact text of the correct answer choice. No explanation.
  prompt_library:
    sample: '{prompt}'
    test: 'Answer this question. Output only the correct answer, no explanation.

      {input}

      '
  rubric:
    accuracy: The answer exactly matches the scientifically correct choice.
    relevance: The answer directly addresses the question asked.
  sampling:
    nuance:
    - 0
    target:
    - 1
    total: 40
  target_attributes:
    difficulty:
    - easy
    - medium
    - hard
- description: Answer an ARC-Challenge science reasoning multiple-choice question
    with the correct option.
  evaluation_mode: single
  name: science_reasoning
  nuanced_attributes: {}
  output_description: The exact text (or letter) of the correct option. No explanation.
  prompt_library:
    sample: '{prompt}'
    test: 'Answer this multiple-choice question. Output only the correct option.

      {input}

      '
  rubric:
    accuracy: The selected option is the correct answer to the reasoning question.
    relevance: The response answers the question rather than restating it.
  sampling:
    nuance:
    - 0
    target:
    - 1
    total: 40
  target_attributes:
    difficulty:
    - easy
    - medium
    - hard
