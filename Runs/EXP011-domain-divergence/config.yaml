experiment:
  generation_retries: 2
  id: EXP011-domain-divergence
  log_level: INFO
  storage_folder: ./Runs
models:
- interface: openrouter
  name: teacher
  parameters:
    max_tokens: 512
    model: openai/gpt-4o-mini
    temperature: 0.8
  roles:
  - teacher
- interface: openrouter
  name: gpt-4o-mini
  parameters:
    max_tokens: 400
    model: openai/gpt-4o-mini
    temperature: 0.5
  roles:
  - student
- interface: openrouter
  name: gpt-3.5-turbo
  parameters:
    max_tokens: 400
    model: openai/gpt-3.5-turbo
    temperature: 0.5
  roles:
  - student
- interface: openrouter
  name: claude-3.5-haiku
  parameters:
    max_tokens: 400
    model: anthropic/claude-3.5-haiku
    temperature: 0.5
  roles:
  - student
- interface: openrouter
  name: gemini-flash
  parameters:
    max_tokens: 400
    model: google/gemini-2.5-flash
    temperature: 0.5
  roles:
  - student
- interface: openrouter
  name: llama-3.1-8b
  parameters:
    max_tokens: 400
    model: meta-llama/llama-3.1-8b-instruct
    temperature: 0.5
  roles:
  - student
- interface: openrouter
  name: qwen-2.5-7b
  parameters:
    max_tokens: 400
    model: qwen/qwen-2.5-7b-instruct
    temperature: 0.5
  roles:
  - student
- interface: openrouter
  name: judge-gpt4o-mini
  parameters:
    max_tokens: 128
    model: openai/gpt-4o-mini
    temperature: 0.0
  roles:
  - judge
- interface: openrouter
  name: judge-claude-haiku
  parameters:
    max_tokens: 128
    model: anthropic/claude-3.5-haiku
    temperature: 0.0
  roles:
  - judge
- interface: openrouter
  name: judge-gemini-flash
  parameters:
    max_tokens: 128
    model: google/gemini-2.5-flash
    temperature: 0.0
  roles:
  - judge
tasks:
- description: A grade-school to early-algebra math word problem requiring multi-step
    numeric reasoning.
  evaluation_mode: single
  name: math_word_problems
  output_description: The final numeric answer with brief working shown.
  rubric: auto
  sampling:
    nuance:
    - 0
    target:
    - 1
    total: 25
  target_attributes:
    difficulty:
    - easy
    - medium
    - hard
- description: Explain what a given short Python function does, including its purpose
    and edge-case behavior.
  evaluation_mode: single
  name: code_explanation
  output_description: A clear, correct explanation of the function's behavior.
  rubric: auto
  sampling:
    nuance:
    - 0
    target:
    - 1
    total: 25
  target_attributes:
    difficulty:
    - easy
    - medium
    - hard
- description: A clinical reasoning question a clinician would face, requiring medical
    knowledge and safe, accurate reasoning.
  evaluation_mode: single
  name: clinical_reasoning
  output_description: A concise, clinically accurate answer with correct reasoning.
  rubric: auto
  sampling:
    nuance:
    - 0
    target:
    - 1
    total: 25
  target_attributes:
    difficulty:
    - routine
    - hard
    specialty:
    - cardiology
    - infectious_disease
    - pediatrics
    - emergency
- description: A legal analysis question requiring identification of the relevant
    rule and correct application to the facts.
  evaluation_mode: single
  name: legal_analysis
  output_description: 'A concise legal analysis: issue, governing rule, and correct
    application.'
  rubric: auto
  sampling:
    nuance:
    - 0
    target:
    - 1
    total: 25
  target_attributes:
    area_of_law:
    - contracts
    - torts
    - criminal
    - constitutional
    complexity:
    - basic
    - advanced
