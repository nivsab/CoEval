models:
  - name: sciq
    interface: benchmark
    parameters: { description: "SciQ science exam QA (exact-match ground truth)", task: science_qa }
    roles: [teacher]

  - name: arc_challenge
    interface: benchmark
    parameters: { description: "ARC-Challenge science reasoning MCQ (harder; spreads models)", task: science_reasoning }
    roles: [teacher]

  # ---- Students: capability-spread roster (gold ranking has resolution) ----
  - name: gpt-4o
    interface: openrouter
    parameters: { model: openai/gpt-4o, temperature: 0.7, max_tokens: 256 }
    roles: [student]
  - name: gpt-4o-mini
    interface: openrouter
    parameters: { model: openai/gpt-4o-mini, temperature: 0.7, max_tokens: 256 }
    roles: [student]
  - name: claude-3.5-sonnet
    interface: openrouter
    parameters: { model: anthropic/claude-3.5-sonnet, temperature: 0.7, max_tokens: 256 }
    roles: [student]
  - name: claude-3.5-haiku-student
    interface: openrouter
    parameters: { model: anthropic/claude-3.5-haiku, temperature: 0.7, max_tokens: 256 }
    roles: [student]
  - name: gemini-flash-student
    interface: openrouter
    parameters: { model: google/gemini-2.5-flash, temperature: 0.7, max_tokens: 256 }
    roles: [student]
  - name: llama-3.3-70b
    interface: openrouter
    parameters: { model: meta-llama/llama-3.3-70b-instruct, temperature: 0.7, max_tokens: 256 }
    roles: [student]
  - name: llama-3.1-8b
    interface: openrouter
    parameters: { model: meta-llama/llama-3.1-8b-instruct, temperature: 0.7, max_tokens: 256 }
    roles: [student]
  - name: llama-3.2-3b
    interface: openrouter
    parameters: { model: meta-llama/llama-3.2-3b-instruct, temperature: 0.7, max_tokens: 256 }
    roles: [student]

  # ---- Cross-family judge panel (vendor-disjoint trio) ----
  - name: judge-gpt4o-mini
    interface: openrouter
    parameters: { model: openai/gpt-4o-mini, temperature: 0.0, max_tokens: 128 }
    roles: [judge]
  - name: judge-claude-haiku
    interface: openrouter
    parameters: { model: anthropic/claude-3.5-haiku, temperature: 0.0, max_tokens: 128 }
    roles: [judge]
  - name: judge-gemini-flash
    interface: openrouter
    parameters: { model: google/gemini-2.5-flash, temperature: 0.0, max_tokens: 128 }
    roles: [judge]

tasks:
  - name: science_qa
    description: "Answer a science exam multiple-choice question. Output only the correct option text."
    output_description: "The exact text of the correct answer choice. No explanation."
    target_attributes: { difficulty: [easy, medium, hard] }
    nuanced_attributes: {}
    sampling: { target: [1], nuance: [0], total: 40 }
    rubric:
      accuracy: "The answer exactly matches the scientifically correct choice."
      relevance: "The answer directly addresses the question asked."
    evaluation_mode: single
    prompt_library:
      test: |
        Answer this question. Output only the correct answer, no explanation.
        {input}
      sample: "{prompt}"

  - name: science_reasoning
    description: "Answer an ARC-Challenge science reasoning multiple-choice question with the correct option."
    output_description: "The exact text (or letter) of the correct option. No explanation."
    target_attributes: { difficulty: [easy, medium, hard] }
    nuanced_attributes: {}
    sampling: { target: [1], nuance: [0], total: 40 }
    rubric:
      accuracy: "The selected option is the correct answer to the reasoning question."
      relevance: "The response answers the question rather than restating it."
    evaluation_mode: single
    prompt_library:
      test: |
        Answer this multiple-choice question. Output only the correct option.
        {input}
      sample: "{prompt}"

experiment:
  id: EXP010-scale-ranking-pilot
  storage_folder: ./Runs
  log_level: INFO
  generation_retries: 2
